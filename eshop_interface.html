<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Shop Maroc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:        #0d0d0f;
    --surface:   #16161a;
    --surface2:  #1e1e24;
    --border:    rgba(255,255,255,.07);
    --gold:      #d4a843;
    --gold-dim:  #a07a28;
    --text:      #e8e6e1;
    --muted:     #888794;
    --red:       #e05252;
    --green:     #4caf7d;
    --blue:      #4c8eaf;
    --radius:    14px;
    --trans:     .22s cubic-bezier(.4,0,.2,1);
  }

  /* ── RESET ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NAV ─────────────────────────────────────────────── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,.92);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    gap: 1rem; padding: .75rem 2rem;
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 900;
    color: var(--gold); letter-spacing: -.02em;
    flex: 1;
  }
  .nav-logo span { color: var(--text); }
  .search-wrap {
    flex: 1; max-width: 420px;
    position: relative;
  }
  .search-wrap input {
    width: 100%; padding: .55rem 1rem .55rem 2.6rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px; color: var(--text);
    font-family: inherit; font-size: .9rem;
    outline: none; transition: border var(--trans);
  }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-wrap svg {
    position: absolute; left: .85rem; top: 50%;
    transform: translateY(-50%);
    fill: var(--muted); width: 16px; height: 16px;
  }
  .nav-actions { display: flex; gap: .75rem; align-items: center; }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text); padding: .45rem 1rem;
    border-radius: 8px; cursor: pointer;
    font-family: inherit; font-size: .85rem;
    transition: background var(--trans), border-color var(--trans);
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--gold); }
  .cart-btn {
    position: relative;
    background: var(--gold); border: none; color: #0d0d0f;
    padding: .45rem 1.1rem; border-radius: 8px;
    cursor: pointer; font-family: inherit;
    font-size: .85rem; font-weight: 600;
    transition: background var(--trans);
  }
  .cart-btn:hover { background: #c09535; }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--red); color: #fff;
    font-size: .65rem; font-weight: 700;
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  #user-pill {
    font-size: .82rem; color: var(--gold);
    background: rgba(212,168,67,.1);
    border: 1px solid rgba(212,168,67,.25);
    padding: .3rem .75rem; border-radius: 20px;
    display: none; align-items: center; gap: .4rem;
  }

  /* ── HERO ────────────────────────────────────────────── */
  .hero {
    padding: 5rem 2rem 3.5rem;
    text-align: center;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(212,168,67,.12), transparent),
      var(--bg);
  }
  .hero-tag {
    display: inline-block;
    font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold);
    background: rgba(212,168,67,.1);
    border: 1px solid rgba(212,168,67,.25);
    padding: .3rem .9rem; border-radius: 20px; margin-bottom: 1.4rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4.5rem);
    font-weight: 900; line-height: 1.08;
    letter-spacing: -.03em; margin-bottom: 1.1rem;
  }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p {
    color: var(--muted); font-size: 1.05rem;
    max-width: 460px; margin: 0 auto 2rem;
    line-height: 1.7;
  }
  .hero-cta {
    display: inline-block;
    background: var(--gold); color: #0d0d0f;
    font-weight: 600; font-size: .95rem;
    padding: .75rem 2rem; border-radius: 10px;
    cursor: pointer; border: none;
    font-family: inherit;
    transition: transform var(--trans), background var(--trans);
  }
  .hero-cta:hover { background: #c09535; transform: translateY(-2px); }

  /* ── LAYOUT ──────────────────────────────────────────── */
  .main-wrap {
    max-width: 1300px; margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 2rem; align-items: start;
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  .sidebar {
    position: sticky; top: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem; font-size: .88rem;
  }
  .sidebar h3 {
    font-family: 'Playfair Display', serif;
    font-size: .85rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 1rem;
  }
  .filter-group { margin-bottom: 1.5rem; }
  .cat-btn {
    display: flex; align-items: center; gap: .6rem;
    width: 100%; padding: .55rem .7rem;
    background: none; border: none; color: var(--text);
    font-family: inherit; font-size: .88rem;
    border-radius: 8px; cursor: pointer;
    transition: background var(--trans), color var(--trans);
    text-align: left;
  }
  .cat-btn:hover { background: var(--surface2); }
  .cat-btn.active { background: rgba(212,168,67,.15); color: var(--gold); }
  .cat-icon { font-size: 1rem; }
  .price-range { display: flex; gap: .5rem; }
  .price-range input {
    width: 100%; padding: .4rem .6rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text);
    font-family: inherit; font-size: .82rem; outline: none;
  }
  .price-range input:focus { border-color: var(--gold); }
  .apply-btn {
    width: 100%; margin-top: .6rem;
    padding: .5rem; background: var(--gold);
    border: none; border-radius: 8px; color: #0d0d0f;
    font-family: inherit; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: background var(--trans);
  }
  .apply-btn:hover { background: #c09535; }

  /* ── PRODUCT GRID ────────────────────────────────────── */
  .products-section {}
  .section-header {
    display: flex; align-items: baseline;
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 700;
  }
  .section-count { color: var(--muted); font-size: .88rem; }
  .sort-select {
    margin-left: auto;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: .4rem .8rem;
    border-radius: 8px; font-family: inherit; font-size: .85rem;
    outline: none; cursor: pointer;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 1.2rem;
  }

  /* ── PRODUCT CARD ────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform var(--trans), border-color var(--trans),
                box-shadow var(--trans);
    cursor: pointer;
    animation: fadeUp .4s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(212,168,67,.35);
    box-shadow: 0 16px 40px rgba(0,0,0,.4);
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .card-thumb {
    height: 160px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    background: var(--surface2);
    position: relative;
  }
  .promo-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--red); color: #fff;
    font-size: .68rem; font-weight: 700; letter-spacing: .05em;
    text-transform: uppercase;
    padding: .22rem .55rem; border-radius: 5px;
  }
  .out-badge {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,.7); color: var(--muted);
    font-size: .7rem; padding: .2rem .5rem; border-radius: 4px;
  }
  .card-body { padding: .9rem 1rem 1rem; }
  .card-cat {
    font-size: .7rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--gold-dim); margin-bottom: .3rem;
  }
  .card-name {
    font-weight: 600; font-size: .95rem; line-height: 1.3;
    margin-bottom: .4rem;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-stars { color: var(--gold); font-size: .8rem; margin-bottom: .55rem; }
  .card-stars span { color: var(--muted); font-size: .75rem; margin-left: .3rem; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: .5rem;
  }
  .card-price { font-weight: 700; font-size: 1.1rem; }
  .card-original {
    font-size: .75rem; color: var(--muted);
    text-decoration: line-through; margin-left: .3rem;
  }
  .add-btn {
    background: var(--gold); border: none; color: #0d0d0f;
    font-size: .8rem; font-weight: 600;
    padding: .4rem .85rem; border-radius: 7px;
    cursor: pointer; font-family: inherit;
    transition: background var(--trans), transform var(--trans);
  }
  .add-btn:hover { background: #c09535; transform: scale(1.05); }
  .add-btn:disabled {
    background: var(--surface2); color: var(--muted); cursor: not-allowed;
    transform: none;
  }

  /* ── MODAL OVERLAY ───────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; opacity: 0; pointer-events: none;
    transition: opacity var(--trans);
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 2rem;
    width: 100%; max-width: 520px;
    max-height: 88vh; overflow-y: auto;
    transform: scale(.96);
    transition: transform var(--trans);
  }
  .overlay.open .modal { transform: scale(1); }
  .modal-header {
    display: flex; align-items: center; margin-bottom: 1.5rem;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700; flex: 1;
  }
  .close-btn {
    background: none; border: none; color: var(--muted);
    font-size: 1.4rem; cursor: pointer; line-height: 1;
    transition: color var(--trans);
  }
  .close-btn:hover { color: var(--text); }

  /* ── AUTH MODAL ──────────────────────────────────────── */
  .auth-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; }
  .auth-tab {
    flex: 1; padding: .6rem;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-family: inherit; font-size: .9rem;
    cursor: pointer; transition: all var(--trans);
  }
  .auth-tab:first-child { border-radius: 8px 0 0 8px; }
  .auth-tab:last-child  { border-radius: 0 8px 8px 0; }
  .auth-tab.active {
    background: var(--gold); color: #0d0d0f;
    border-color: var(--gold); font-weight: 600;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block; font-size: .82rem;
    color: var(--muted); margin-bottom: .35rem;
  }
  .form-group input, .form-group select {
    width: 100%; padding: .6rem .9rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text);
    font-family: inherit; font-size: .92rem; outline: none;
    transition: border-color var(--trans);
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--gold); }
  .form-group select option { background: var(--surface2); }
  .submit-btn {
    width: 100%; padding: .75rem;
    background: var(--gold); border: none; color: #0d0d0f;
    font-family: inherit; font-size: .95rem; font-weight: 700;
    border-radius: 10px; cursor: pointer;
    transition: background var(--trans);
  }
  .submit-btn:hover { background: #c09535; }
  .form-note {
    text-align: center; margin-top: .75rem;
    font-size: .82rem; color: var(--muted);
  }
  .form-note a { color: var(--gold); cursor: pointer; text-decoration: none; }

  /* ── PRODUCT DETAIL MODAL ────────────────────────────── */
  .detail-thumb {
    height: 200px; border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; margin-bottom: 1.2rem;
    position: relative;
  }
  .detail-cat {
    font-size: .75rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--gold); margin-bottom: .4rem;
  }
  .detail-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 700; margin-bottom: .5rem;
  }
  .detail-stars { color: var(--gold); font-size: .9rem; margin-bottom: .75rem; }
  .detail-price-row {
    display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1.2rem;
  }
  .detail-price { font-size: 1.8rem; font-weight: 700; color: var(--gold); }
  .detail-original {
    font-size: 1rem; color: var(--muted); text-decoration: line-through;
  }
  .detail-attrs {
    background: var(--surface2); border-radius: 10px;
    padding: 1rem; margin-bottom: 1.2rem;
  }
  .attr-row {
    display: flex; justify-content: space-between;
    padding: .35rem 0; border-bottom: 1px solid var(--border);
    font-size: .88rem;
  }
  .attr-row:last-child { border-bottom: none; }
  .attr-key { color: var(--muted); }
  .attr-val { font-weight: 500; }
  .qty-row {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
  }
  .qty-row label { font-size: .88rem; color: var(--muted); }
  .qty-ctrl {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .qty-ctrl button {
    width: 34px; height: 34px; background: var(--surface2);
    border: none; color: var(--text); font-size: 1.1rem;
    cursor: pointer; transition: background var(--trans);
  }
  .qty-ctrl button:hover { background: var(--border); }
  .qty-ctrl span {
    width: 40px; text-align: center; font-weight: 600; font-size: .95rem;
  }

  /* ── CART PANEL ──────────────────────────────────────── */
  .cart-panel {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 300;
    width: min(420px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow: -20px 0 60px rgba(0,0,0,.5);
  }
  .cart-panel.open { transform: translateX(0); }
  .cart-top {
    display: flex; align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .cart-top h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; flex: 1;
  }
  .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
  .cart-empty {
    text-align: center; padding: 3rem 0;
    color: var(--muted); font-size: .9rem;
  }
  .cart-empty .empty-icon { font-size: 3rem; margin-bottom: .75rem; }
  .cart-item {
    display: flex; gap: .9rem; align-items: flex-start;
    padding: .9rem 0; border-bottom: 1px solid var(--border);
    animation: fadeUp .25s ease both;
  }
  .cart-item-icon {
    width: 52px; height: 52px; border-radius: 9px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: .9rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cart-item-meta { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
  .cart-item-price { font-weight: 700; color: var(--gold); font-size: .95rem; }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: .5rem; }
  .remove-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem;
    transition: color var(--trans);
  }
  .remove-btn:hover { color: var(--red); }
  .cart-bottom { padding: 1.25rem 1.5rem; border-top: 1px solid var(--border); }
  .promo-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .promo-row input {
    flex: 1; padding: .5rem .75rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text);
    font-family: inherit; font-size: .85rem; outline: none;
  }
  .promo-row input:focus { border-color: var(--gold); }
  .promo-apply {
    padding: .5rem .9rem; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--gold); font-family: inherit; font-size: .85rem;
    cursor: pointer; font-weight: 600; white-space: nowrap;
    transition: background var(--trans);
  }
  .promo-apply:hover { background: rgba(212,168,67,.1); }
  .total-rows { margin-bottom: 1rem; }
  .total-row {
    display: flex; justify-content: space-between;
    font-size: .9rem; padding: .25rem 0; color: var(--muted);
  }
  .total-row.grand {
    color: var(--text); font-weight: 700; font-size: 1.1rem;
    border-top: 1px solid var(--border); padding-top: .6rem;
    margin-top: .4rem;
  }
  .checkout-btn {
    width: 100%; padding: .85rem;
    background: var(--gold); border: none; color: #0d0d0f;
    font-family: inherit; font-size: 1rem; font-weight: 700;
    border-radius: 11px; cursor: pointer;
    transition: background var(--trans), transform var(--trans);
  }
  .checkout-btn:hover { background: #c09535; transform: translateY(-1px); }

  /* ── TOAST ───────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--gold);
    color: var(--text); padding: .65rem 1.4rem;
    border-radius: 30px; font-size: .88rem;
    opacity: 0; transition: all .3s ease; pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── CHECKOUT MODAL ──────────────────────────────────── */
  .step-indicator {
    display: flex; gap: 0; margin-bottom: 1.5rem; border-radius: 10px;
    overflow: hidden; border: 1px solid var(--border);
  }
  .step {
    flex: 1; padding: .5rem; text-align: center;
    font-size: .78rem; color: var(--muted);
    background: var(--surface2);
    transition: all var(--trans);
  }
  .step.active { background: var(--gold); color: #0d0d0f; font-weight: 600; }
  .step.done   { background: rgba(76,175,125,.15); color: var(--green); }
  .payment-tabs { display: flex; gap: .75rem; margin-bottom: 1.25rem; }
  .pay-tab {
    flex: 1; padding: .65rem; border: 1px solid var(--border);
    border-radius: 9px; background: var(--surface2);
    color: var(--muted); font-family: inherit; font-size: .88rem;
    cursor: pointer; text-align: center;
    transition: all var(--trans);
  }
  .pay-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(212,168,67,.08); }
  .success-screen { text-align: center; padding: 1.5rem 0; }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; }
  .success-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; margin-bottom: .6rem;
  }
  .success-screen p { color: var(--muted); font-size: .92rem; line-height: 1.6; }
  .ref-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: .6rem 1rem; margin: 1rem 0;
    font-family: monospace; color: var(--gold); font-size: 1rem;
    letter-spacing: .06em;
  }

  /* ── RESPONSIVE ──────────────────────────────────────── */
  @media (max-width: 800px) {
    .main-wrap {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: static;
      display: flex; flex-wrap: wrap; gap: .4rem; padding: .75rem;
    }
    .sidebar .filter-group { margin-bottom: 0; }
  }
  @media (max-width: 550px) {
    nav { padding: .6rem 1rem; }
    .nav-logo { font-size: 1.2rem; }
    .search-wrap { display: none; }
    .hero { padding: 3rem 1rem 2rem; }
  }
</style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav>
  <div class="nav-logo">E<span>-Shop</span></div>
  <div class="search-wrap">

<script>
// =============================================================

// =============================================================
const PRODUCTS = [

    stock:500, note:0, categorie:"Ticket", statut:"Disponible",
    enPromotion:false, icon:"🎵",
    details:{ Événement:"Gnawa World Music Festival", Lieu:"Essaouira",
              Date:"20/06/2025", Place:"Standard", Restantes:"500" },
    commentaires:[]
  }
];

// =============================================================
//  STATE
// =============================================================
let state = {
  user: null,       // { prenom, nom, email, role, prime }
  cart: [],         // [{ product, qty }]
  promo: { code:"", pct:0 },
  filter: { cat:"all", minP:0, maxP:Infinity, search:"" },
  sort: "default"
};

// =============================================================
//  RENDER HELPERS
// =============================================================
function stars(n, max=5) {
  let s = "";
  for (let i=1; i<=max; i++) s += i <= Math.round(n) ? "★" : "☆";
  return s;
}
function fmt(n) { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,","); }
function toast(msg, dur=2600) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}

// =============================================================
//  FILTERING & SORTING
// =============================================================
function getFiltered() {
  let list = [...PRODUCTS];
  const f = state.filter;

  if (f.cat === "promo")  list = list.filter(p => p.enPromotion);
  else if (f.cat !== "all") list = list.filter(p => p.categorie === f.cat);

  if (f.search)
    list = list.filter(p => p.nom.toLowerCase().includes(f.search.toLowerCase()));

  list = list.filter(p => p.prix >= f.minP && p.prix <= f.maxP);

  if (state.sort === "price-asc")  list.sort((a,b) => a.prix - b.prix);
  if (state.sort === "price-desc") list.sort((a,b) => b.prix - a.prix);
  if (state.sort === "note-desc")  list.sort((a,b) => b.note - a.note);

  return list;
}

// =============================================================
//  RENDER PRODUCT GRID
// =============================================================
function renderGrid() {
  const grid  = document.getElementById("product-grid");
  const list  = getFiltered();
  document.getElementById("prod-count").textContent =
    list.length + " produit(s)";

  if (!list.length) {
    grid.innerHTML = `<p style="color:var(--muted);grid-column:1/-1;padding:2rem 0">
      Aucun produit trouvé.</p>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => {
    const oos = p.stock === 0;
    return `
    <div class="card" style="animation-delay:${i*40}ms"
         onclick="openDetail(${p.id})">
      <div class="card-thumb">
        ${p.icon}
        ${p.enPromotion ? `<span class="promo-badge">−${p.pct}%</span>` : ""}
        ${oos ? `<span class="out-badge">Rupture</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.categorie}</div>
        <div class="card-name">${p.nom}</div>
        <div class="card-stars">
          ${p.note > 0 ? stars(p.note) : "☆☆☆☆☆"}
          <span>(${p.commentaires.length} avis)</span>
        </div>
        <div class="card-footer">
          <div>
            <span class="card-price">${fmt(p.prix)} MAD</span>
            ${p.enPromotion ? `<span class="card-original">${fmt(p.prixOriginal)}</span>` : ""}
          </div>
          <button class="add-btn" ${oos?"disabled":""} 
            onclick="event.stopPropagation(); quickAdd(${p.id})">
            ${oos ? "Épuisé" : "+ Panier"}
          </button>
        </div>
      </div>
    </div>`;
  }).join("");
}

// =============================================================
//  PRODUCT DETAIL
// =============================================================
function openDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;

  const attrs = Object.entries(p.details)
    .map(([k,v]) => `<div class="attr-row">
      <span class="attr-key">${k}</span>
      <span class="attr-val">${v}</span>
    </div>`).join("");

  const revs = p.commentaires.length
    ? p.commentaires.map(c => `
      <div style="padding:.5rem 0;border-bottom:1px solid var(--border)">
        <div style="font-size:.8rem;color:var(--gold)">${stars(c.etoiles)} 
          <span style="color:var(--muted);margin-left:.3rem">${c.auteur}</span>
        </div>
        <div style="font-size:.85rem;color:var(--text);margin-top:.2rem">
          "${c.texte}"
        </div>
      </div>`).join("")
    : `<p style="color:var(--muted);font-size:.85rem">Aucun avis pour l'instant.</p>`;

  document.getElementById("detail-modal").innerHTML = `
    <div class="modal-header">
      <h2 class="modal-title">Détails du produit</h2>
      <button class="close-btn" onclick="closeOverlay('detail-overlay')">✕</button>
    </div>
    <div class="detail-thumb">${p.icon}
      ${p.enPromotion ? `<span class="promo-badge" style="bottom:10px;top:auto;right:10px">
        −${p.pct}% PROMO</span>` : ""}
    </div>
    <div class="detail-cat">${p.categorie}</div>
    <div class="detail-name">${p.nom}</div>
    <div class="detail-stars">${stars(p.note)} 
      <span style="color:var(--muted);font-size:.82rem">
        (${p.commentaires.length} avis)</span>
    </div>
    <div class="detail-price-row">
      <span class="detail-price">${fmt(p.prix)} MAD</span>
      ${p.enPromotion
        ? `<span class="detail-original">${fmt(p.prixOriginal)} MAD</span>` : ""}
    </div>
    <div class="detail-attrs">${attrs}</div>
    <div class="qty-row">
      <label>Quantité</label>
      <div class="qty-ctrl">
        <button onclick="detailQty(-1)">−</button>
        <span id="detail-qty">1</span>
        <button onclick="detailQty(+1)">+</button>
      </div>
      <span style="color:var(--muted);font-size:.82rem">
        Stock: ${p.stock}</span>
    </div>
    <button class="submit-btn" ${p.stock===0?"disabled":""} 
      onclick="addFromDetail(${p.id})">
      ${p.stock===0 ? "Rupture de stock" : "Ajouter au panier"}
    </button>
    <div style="margin-top:1.5rem">
      <h3 style="font-family:'Playfair Display',serif;font-size:1rem;
          margin-bottom:.75rem;">Avis clients</h3>
      ${revs}
    </div>
  `;
  openOverlay("detail-overlay");
}

let _detailQty = 1;
function detailQty(d) {
  _detailQty = Math.max(1, _detailQty + d);
  document.getElementById("detail-qty").textContent = _detailQty;
}
function addFromDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  addToCart(p, _detailQty);
  _detailQty = 1;
  closeOverlay("detail-overlay");
}
function quickAdd(id) {
  const p = PRODUCTS.find(x => x.id === id);
  addToCart(p, 1);
}

// =============================================================
//  CART
// =============================================================
function addToCart(p, qty=1) {
  if (!state.user) {
    toast("Connectez-vous pour ajouter au panier");
    openOverlay("auth-overlay"); return;
  }
  if (p.stock === 0) { toast("Produit épuisé"); return; }

  const existing = state.cart.find(x => x.product.id === p.id);
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, p.stock);
    toast(`Quantité mise à jour : ${existing.qty}x ${p.nom}`);
  } else {
    state.cart.push({ product: p, qty: Math.min(qty, p.stock) });
    toast(`✓ ${p.nom} ajouté au panier`);
  }
  renderCart();
}

function removeFromCart(id) {
  state.cart = state.cart.filter(x => x.product.id !== id);
  renderCart();
}

function cartSubtotal() {
  let s = state.cart.reduce((acc, x) => acc + x.product.prix * x.qty, 0);
  if (state.user?.prime) s *= 0.85;
  return s;
}
function cartAfterPromo() {
  return cartSubtotal() * (1 - state.promo.pct / 100);
}
function cartTotal()    { return cartAfterPromo() + 25; }

function renderCart() {
  // Badge
  const n = state.cart.reduce((a,x)=>a+x.qty,0);
  const badge = document.getElementById("cart-badge");
  badge.textContent = n;
  badge.style.display = n > 0 ? "flex" : "none";

  // Items
  const wrap = document.getElementById("cart-items");
  if (!state.cart.length) {
    wrap.innerHTML = `<div class="cart-empty">
      <div class="empty-icon">🛒</div>
      <p>Votre panier est vide</p>
    </div>`;
  } else {
    wrap.innerHTML = state.cart.map(x => `
      <div class="cart-item">
        <div class="cart-item-icon">${x.product.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${x.product.nom}</div>
          <div class="cart-item-meta">${x.qty} × ${fmt(x.product.prix)} MAD</div>
        </div>
        <div class="cart-item-right">
          <button class="remove-btn" onclick="removeFromCart(${x.product.id})">✕</button>
          <span class="cart-item-price">${fmt(x.product.prix * x.qty)} MAD</span>
        </div>
      </div>`).join("");
  }

  // Totals
  const sub   = cartSubtotal();
  const prime = state.user?.prime ? sub / 0.85 * 0.15 : 0;
  const disc  = cartSubtotal() * (state.promo.pct / 100);
  const total = cartTotal();

  document.getElementById("total-rows").innerHTML = `
    <div class="total-row"><span>Sous-total</span>
      <span>${fmt(state.user?.prime ? sub/0.85 : sub)} MAD</span></div>
    ${state.user?.prime
      ? `<div class="total-row"><span>Remise Prime (−15%)</span>
         <span style="color:var(--gold)">−${fmt(prime)} MAD</span></div>` : ""}
    ${state.promo.pct > 0
      ? `<div class="total-row"><span>Promo « ${state.promo.code} » (−${state.promo.pct}%)</span>
         <span style="color:var(--gold)">−${fmt(disc)} MAD</span></div>` : ""}
    <div class="total-row"><span>Livraison</span><span>25.00 MAD</span></div>
    <div class="total-row grand"><span>Total</span><span>${fmt(total)} MAD</span></div>
  `;
}

function toggleCart() {
  document.getElementById("cart-panel").classList.toggle("open");
}

function applyPromo() {
  const code = document.getElementById("promo-input").value.trim().toUpperCase();
  const PROMOS = { "BIENVENUE":10, "PROMO20":20, "VIP30":30 };
  if (PROMOS[code]) {
    state.promo = { code, pct: PROMOS[code] };
    toast(`Code « ${code} » appliqué : −${PROMOS[code]}%`);
    renderCart();
  } else {
    toast("Code promo invalide");
  }
}

// =============================================================
//  CHECKOUT
// =============================================================
let checkoutStep = 1;
let paymentMode  = "carte";

function openCheckout() {
  if (!state.cart.length) { toast("Panier vide"); return; }
  if (!state.user) {
    toast("Connectez-vous d'abord"); openOverlay("auth-overlay"); return;
  }
  checkoutStep = 1;
  renderCheckout();
  openOverlay("checkout-overlay");
}

function renderCheckout() {
  const m = document.getElementById("checkout-modal");

  if (checkoutStep === 3) {
    const ref = "REF" + Math.floor(100000 + Math.random()*900000);
    // Simulate clearing cart after order
    setTimeout(() => {
      state.cart = []; state.promo = {code:"",pct:0};
      renderCart();
    }, 500);
    m.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">🎉</div>
        <h2>Commande confirmée !</h2>
        <p>Merci, <strong>${state.user.prenom}</strong> !<br>
          Votre commande a bien été enregistrée.</p>
        <div class="ref-box">${ref}</div>
        <p>Un e-mail de confirmation sera envoyé à<br>
          <strong>${state.user.email}</strong></p>
        <button class="submit-btn" style="margin-top:1.5rem"
          onclick="closeOverlay('checkout-overlay')">
          Retour au catalogue
        </button>
      </div>`;
    return;
  }

  const steps = `
    <div class="step-indicator">
      <div class="step ${checkoutStep===1?"active":checkoutStep>1?"done":""}">1. Livraison</div>
      <div class="step ${checkoutStep===2?"active":checkoutStep>2?"done":""}">2. Paiement</div>
      <div class="step ${checkoutStep===3?"active":""}">3. Confirmation</div>
    </div>`;

  if (checkoutStep === 1) {
    m.innerHTML = `
      <div class="modal-header">
        <h2 class="modal-title">Finaliser la commande</h2>
        <button class="close-btn" onclick="closeOverlay('checkout-overlay')">✕</button>
      </div>
      ${steps}
      <div class="form-group">
        <label>Adresse de livraison</label>
        <input type="text" id="co-address"
          placeholder="Rue, Quartier, Ville"
          value="${state.user.adresse||''}">
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="co-tel"
          placeholder="06XXXXXXXX"
          value="${state.user.tel||''}">
      </div>
      <div class="total-rows" style="margin:1rem 0">
        <div class="total-row grand">
          <span>Total à payer</span>
          <span style="color:var(--gold)">${fmt(cartTotal())} MAD</span>
        </div>
      </div>
      <button class="submit-btn" onclick="checkoutNext()">
        Continuer → Paiement
      </button>`;
  }

  if (checkoutStep === 2) {
    const carteForm = `
      <div id="carte-form">
        <div class="form-group">
          <label>Numéro de carte (16 chiffres)</label>
          <input type="text" id="co-card" placeholder="0000 0000 0000 0000" maxlength="16">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
          <div class="form-group">
            <label>Titulaire</label>
            <input type="text" id="co-holder" placeholder="Nom Prénom">
          </div>
          <div class="form-group">
            <label>Expiration</label>
            <input type="text" id="co-exp" placeholder="MM/AA" maxlength="5">
          </div>
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="text" id="co-cvv" placeholder="123" maxlength="3">
        </div>
      </div>`;
    const ppForm = `
      <div id="paypal-form" style="display:none">
        <div class="form-group">
          <label>Email PayPal</label>
          <input type="email" id="co-pp-email" placeholder="votre@paypal.com">
        </div>
        <div class="form-group">
          <label>Mot de passe PayPal</label>
          <input type="password" id="co-pp-pwd" placeholder="••••••••">
        </div>
      </div>`;
    m.innerHTML = `
      <div class="modal-header">
        <h2 class="modal-title">Paiement</h2>
        <button class="close-btn" onclick="closeOverlay('checkout-overlay')">✕</button>
      </div>
      ${steps}
      <div class="payment-tabs">
        <button class="pay-tab active" id="tab-carte"
          onclick="switchPayTab('carte')">💳 Carte Bancaire</button>
        <button class="pay-tab" id="tab-paypal"
          onclick="switchPayTab('paypal')">🅿️ PayPal</button>
      </div>
      ${carteForm}${ppForm}
      <div class="total-rows" style="margin:1rem 0">
        <div class="total-row grand">
          <span>Total à débiter</span>
          <span style="color:var(--gold)">${fmt(cartTotal())} MAD</span>
        </div>
      </div>
      <button class="submit-btn" onclick="checkoutNext()">
        Confirmer le paiement ✓
      </button>`;
  }
}

function checkoutNext() {
  if (checkoutStep === 1) {
    const addr = document.getElementById("co-address").value.trim();
    const tel  = document.getElementById("co-tel").value.trim();
    if (!addr) { toast("Entrez une adresse"); return; }
    if (!/^0[67]\d{8}$/.test(tel)) {
      toast("Téléphone invalide (06/07XXXXXXXX)"); return;
    }
    if (state.user) { state.user.adresse = addr; state.user.tel = tel; }
    checkoutStep = 2; renderCheckout();
  } else if (checkoutStep === 2) {
    if (paymentMode === "carte") {
      const card = document.getElementById("co-card")?.value.trim();
      if (!card || card.length !== 16) { toast("Numéro de carte invalide (16 chiffres)"); return; }
    } else {
      const em = document.getElementById("co-pp-email")?.value.trim();
      if (!em || !em.includes("@")) { toast("Email PayPal invalide"); return; }
    }
    checkoutStep = 3; renderCheckout();
  }
}

function switchPayTab(mode) {
  paymentMode = mode;
  document.getElementById("tab-carte").classList.toggle("active", mode==="carte");
  document.getElementById("tab-paypal").classList.toggle("active", mode==="paypal");
  document.getElementById("carte-form").style.display  = mode==="carte"   ? "" : "none";
  document.getElementById("paypal-form").style.display = mode==="paypal"  ? "" : "none";
}

// =============================================================
//  AUTH
// =============================================================
function doLogin() {
  const em  = document.getElementById("login-email").value.trim();
  const pwd = document.getElementById("login-pwd").value;
  if (!em || !pwd) { toast("Remplissez tous les champs"); return; }

  // Simulate auth (in production: POST /api/login with MySQL check)
  const stored = JSON.parse(localStorage.getItem("eshop_user") || "null");
  if (stored && stored.email === em && stored.pwd === pwd) {
    state.user = stored;
    afterLogin();
    closeOverlay("auth-overlay");
    toast(`Bienvenue, ${state.user.prenom} !`);
  } else {
    toast("Email ou mot de passe incorrect");
  }
}

function doSignup() {
  const prenom   = document.getElementById("reg-prenom").value.trim();
  const nom      = document.getElementById("reg-nom").value.trim();
  const email    = document.getElementById("reg-email").value.trim();
  const tel      = document.getElementById("reg-tel").value.trim();
  const pwd      = document.getElementById("reg-pwd").value;
  const role     = document.getElementById("reg-role").value;
  const boutique = document.getElementById("reg-boutique").value.trim();

  if (!prenom||!nom||!email||!tel||!pwd) { toast("Remplissez tous les champs"); return; }
  if (!email.includes("@"))              { toast("Email invalide"); return; }
  if (!/^0[67]\d{8}$/.test(tel))        { toast("Téléphone invalide"); return; }

  const user = {
    prenom, nom, email, tel, pwd,
    role: role === "vendeur" ? "vendeur" : "client",
    prime: role === "prime",
    boutique: role === "vendeur" ? boutique : "",
    adresse: ""
  };
  localStorage.setItem("eshop_user", JSON.stringify(user));
  state.user = user;
  afterLogin();
  closeOverlay("auth-overlay");
  toast(`Compte créé ! Bienvenue, ${prenom} !`);
}

function afterLogin() {
  const p = document.getElementById("user-pill");
  p.style.display = "flex";
  document.getElementById("user-name-nav").textContent =
    state.user.prenom + (state.user.prime ? " ⭐" : "");
  document.getElementById("auth-toggle-btn").textContent = "Déconnexion";
  document.getElementById("auth-toggle-btn").onclick = doLogout;
  renderCart();
  renderGrid();
}

function doLogout() {
  state.user = null;
  state.cart = [];
  state.promo = { code:"", pct:0 };
  document.getElementById("user-pill").style.display = "none";
  document.getElementById("user-name-nav").textContent = "Invité";
  document.getElementById("auth-toggle-btn").textContent = "Connexion";
  document.getElementById("auth-toggle-btn").onclick = () => openOverlay("auth-overlay");
  renderCart(); renderGrid();
  toast("Déconnecté.");
}

function switchAuthTab(tab) {
  document.querySelectorAll(".auth-tab").forEach((b,i) =>
    b.classList.toggle("active", (i===0&&tab==="login")||(i===1&&tab==="signup")));
  document.getElementById("login-form").style.display  = tab==="login"  ? "" : "none";
  document.getElementById("signup-form").style.display = tab==="signup" ? "" : "none";
  document.getElementById("auth-modal-title").textContent =
    tab === "login" ? "Connexion" : "Créer un compte";
}

document.getElementById("reg-role").addEventListener("change", function() {
  document.getElementById("boutique-group").style.display =
    this.value === "vendeur" ? "" : "none";
});

// =============================================================
//  OVERLAY HELPERS
// =============================================================
function openOverlay(id)  { document.getElementById(id).classList.add("open"); }
function closeOverlay(id) { document.getElementById(id).classList.remove("open"); }
function closeOverlayOnClick(e, id) {
  if (e.target.id === id) closeOverlay(id);
}

// =============================================================
//  FILTER / SEARCH WIRING
// =============================================================
document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.filter.cat = btn.dataset.cat;
    state.filter.minP = 0; state.filter.maxP = Infinity;
    document.getElementById("price-min").value = "";
    document.getElementById("price-max").value = "";
    renderGrid();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  state.filter.search = e.target.value;
  renderGrid();
});

document.getElementById("sort-select").addEventListener("change", e => {
  state.sort = e.target.value; renderGrid();
});

function applyPriceFilter() {
  const mn = parseFloat(document.getElementById("price-min").value);
  const mx = parseFloat(document.getElementById("price-max").value);
  state.filter.minP = isNaN(mn) ? 0 : mn;
  state.filter.maxP = isNaN(mx) ? Infinity : mx;
  renderGrid();
}

document.getElementById("auth-toggle-btn").addEventListener("click", () => {
  if (!state.user) openOverlay("auth-overlay");
});

// =============================================================
//  INIT
// =============================================================
renderGrid();
renderCart();
// Try to restore session
const saved = JSON.parse(localStorage.getItem("eshop_user") || "null");
if (saved) { state.user = saved; afterLogin(); }
</script>
</body>
</html>
